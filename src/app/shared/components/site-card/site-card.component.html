<a
  class="card"
  [style.--accent]="site().color"
  [href]="site().status === 'live' ? site().url : null"
  [attr.target]="site().status === 'live' ? '_blank' : null"
  [attr.rel]="site().status === 'live' ? 'noopener noreferrer' : null"
  [class.is-coming-soon]="site().status === 'coming-soon'"
>
  <div class="preview">
    @if (site().status === 'coming-soon') {
      <div class="placeholder">
        <span class="label">Coming soon</span>
      </div>
    } @else if (site().screenshot && !screenshotFailed()) {
      <img [src]="site().screenshot" [alt]="site().name + ' preview'" loading="lazy" (error)="onScreenshotError()" />
    } @else {
      <iframe
        [lazySrc]="site().url"
        [title]="site().name + ' preview'"
        sandbox="allow-scripts allow-same-origin"
      ></iframe>
    }
  </div>

  <footer class="meta">
    <div class="meta-top">
      <h2 class="name">{{ site().name }}</h2>
      @if (site().status === 'coming-soon') {
        <span class="badge">soon</span>
      }
    </div>
    <p class="description">{{ site().description }}</p>
    <div class="tags">
      @for (tag of site().tags; track tag) {
        <span class="tag">{{ tag }}</span>
      }
    </div>
  </footer>
</a>
